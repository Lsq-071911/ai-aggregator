/**
 * utils.js — 全局工具函数库
 * ============================================================
 * 所有模块通用的辅助函数，无外部依赖。
 */

const Utils = (function () {
  'use strict';

  // ============ 安全 ============

  /**
   * HTML 转义，防止 XSS
   */
  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  /**
   * 移除 HTML 标签
   */
  function stripHtml(html) {
    if (!html) return '';
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  // ============ 函数工具 ============

  /**
   * 防抖
   */
  function debounce(fn, delay) {
    let timer = null;
    return function (...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  /**
   * 节流
   */
  function throttle(fn, delay) {
    let last = 0;
    let timer = null;
    return function (...args) {
      const now = Date.now();
      const remaining = delay - (now - last);
      if (remaining <= 0) {
        if (timer) { clearTimeout(timer); timer = null; }
        last = now;
        fn.apply(this, args);
      } else if (!timer) {
        timer = setTimeout(() => {
          last = Date.now();
          timer = null;
          fn.apply(this, args);
        }, remaining);
      }
    };
  }

  // ============ 日期格式化 ============

  /**
   * 格式化日期: "2024-01-15 14:30"
   */
  function formatDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      const pad = (n) => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        '-' + pad(d.getMonth() + 1) +
        '-' + pad(d.getDate()) +
        ' ' + pad(d.getHours()) +
        ':' + pad(d.getMinutes())
      );
    } catch (e) {
      return '—';
    }
  }

  /**
   * 相对时间: "3分钟前"、"昨天"等
   */
  function formatRelativeTime(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      const now = Date.now();
      const diff = now - d.getTime();
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);

      if (seconds < 60) return '刚刚';
      if (minutes < 60) return minutes + '分钟前';
      if (hours < 24) return hours + '小时前';
      if (days === 1) return '昨天';
      if (days < 7) return days + '天前';
      if (days < 30) return Math.floor(days / 7) + '周前';
      if (days < 365) return Math.floor(days / 30) + '个月前';
      return Math.floor(days / 365) + '年前';
    } catch (e) {
      return '—';
    }
  }

  // ============ ID 生成 ============

  /**
   * 生成唯一 ID（简单版 UUID v4）
   */
  function generateId() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
      const r = (Math.random() * 16) | 0;
      const v = c === 'x' ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }

  /**
   * 短 ID（用于本地模拟）
   */
  function shortId(len) {
    len = len || 8;
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < len; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  // ============ 剪贴板 ============

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(() => true).catch(() => fallbackCopy(text));
    }
    return fallbackCopy(text);
    function fallbackCopy(t) {
      const ta = document.createElement('textarea');
      ta.value = t;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand('copy');
        document.body.removeChild(ta);
        return true;
      } catch (e) {
        document.body.removeChild(ta);
        return false;
      }
    }
  }

  // ============ Toast 通知 ============

  function showToast(message, type) {
    type = type || 'info';
    const container = document.getElementById('toast-container');
    if (!container) return;

    const icons = { success: '✓', error: '✗', warning: '⚠', info: 'ℹ' };
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.innerHTML = '<span class="toast-icon">' + icons[type] + '</span><span class="toast-message">' + escapeHtml(message) + '</span>';
    container.appendChild(toast);

    const remove = () => {
      toast.classList.add('removing');
      setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 300);
    };

    setTimeout(remove, 3500);
    toast.addEventListener('click', remove);
  }

  // ============ Modal 弹窗 ============

  function showModal(opts) {
    const overlay = document.getElementById('modal-overlay');
    if (!overlay) return;
    const { title, content, confirmText, cancelText, onConfirm, onCancel, danger } = opts;

    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-title">${escapeHtml(title || '确认')}</div>
        <div class="modal-content">${typeof content === 'string' ? escapeHtml(content) : ''}</div>
        <div class="modal-actions">
          <button class="btn btn-outline modal-cancel">${escapeHtml(cancelText || '取消')}</button>
          <button class="btn ${danger ? 'btn-danger' : 'btn-primary'} modal-confirm">${escapeHtml(confirmText || '确认')}</button>
        </div>
      </div>
    `;
    overlay.style.display = 'flex';

    const close = () => {
      overlay.style.display = 'none';
      overlay.innerHTML = '';
    };

    overlay.querySelector('.modal-cancel').addEventListener('click', () => {
      close();
      if (onCancel) onCancel();
    });
    overlay.querySelector('.modal-confirm').addEventListener('click', () => {
      close();
      if (onConfirm) onConfirm();
    });
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) close();
    });
  }

  // ============ localStorage 包装 ============

  function storage(key, value) {
    if (arguments.length === 1) {
      // 读取
      try {
        const raw = localStorage.getItem('aihub_' + key);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        // 检查过期
        if (parsed._expires && parsed._expires < Date.now()) {
          localStorage.removeItem('aihub_' + key);
          return null;
        }
        return parsed._value !== undefined ? parsed._value : parsed;
      } catch (e) {
        return localStorage.getItem('aihub_' + key);
      }
    } else if (value === null) {
      // 删除
      localStorage.removeItem('aihub_' + key);
    } else {
      // 写入（支持第三个参数：过期时间-分钟）
      const expires = arguments[2] ? Date.now() + arguments[2] * 60000 : undefined;
      const toStore = expires ? { _value: value, _expires: expires } : value;
      try {
        localStorage.setItem('aihub_' + key, JSON.stringify(toStore));
      } catch (e) {
        console.warn('[Storage] 写入失败:', e.message);
      }
    }
  }

  // ============ 文本处理 ============

  function truncateText(text, maxLen) {
    if (!text) return '';
    if (text.length <= maxLen) return text;
    return text.slice(0, maxLen) + '...';
  }

  // ============ 验证 ============

  function isValidEmail(email) {
    if (!email) return false;
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function isValidPassword(pw) {
    if (!pw) return false;
    // 至少8位，包含字母和数字
    return pw.length >= 8 && /[a-zA-Z]/.test(pw) && /\d/.test(pw);
  }

  // ============ JWT 解析 ============

  function parseJWT(token) {
    try {
      if (!token) return null;
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split('')
          .map(function (c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          })
          .join('')
      );
      return JSON.parse(jsonPayload);
    } catch (e) {
      return null;
    }
  }

  // ============ 错误处理 ============

  const errorLog = [];

  function errorHandler(error, context) {
    const entry = {
      timestamp: new Date().toISOString(),
      context: context || 'unknown',
      message: error ? (error.message || String(error)) : 'Unknown error',
      stack: error && error.stack ? error.stack : ''
    };

    errorLog.push(entry);

    // 只保留最近 100 条
    if (errorLog.length > 100) errorLog.shift();

    // 写入 localStorage
    try {
      storage('error_log', errorLog);
    } catch (e) { /* ignore */ }

    console.error('[AI聚合 Error]', context, entry.message, entry);

    // 向用户显示友好提示
    const userMsg = context ? '[' + context + '] ' + entry.message : entry.message;
    if (entry.message && entry.message.length < 80) {
      showToast(userMsg, 'error');
    } else {
      showToast('操作失败，请稍后重试', 'error');
    }
  }

  /**
   * 获取错误日志
   */
  function getErrorLog() {
    return errorLog;
  }

  // ============ 其他工具 ============

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  /**
   * 估算 token 数量（粗略：4 字符 ≈ 1 token）
   */
  function estimateTokens(text) {
    if (!text) return 0;
    // 中文按 1.5 字符/token，英文按 4 字符/token
    const chineseChars = (text.match(/[\u4e00-\u9fff]/g) || []).length;
    const otherChars = text.length - chineseChars;
    return Math.ceil(chineseChars / 1.5 + otherChars / 4);
  }

  return {
    escapeHtml,
    stripHtml,
    debounce,
    throttle,
    formatDate,
    formatRelativeTime,
    generateId,
    shortId,
    copyToClipboard,
    showToast,
    showModal,
    storage,
    truncateText,
    isValidEmail,
    isValidPassword,
    parseJWT,
    errorHandler,
    errorLog,
    getErrorLog,
    sleep,
    estimateTokens
  };
})();

  // ============ 公开 API ============

  function getAllModels() {
    return MODELS.slice();
  }

  function getModelsByProvider() {
    buildIndexes();
    return Object.assign({}, providerIndex);
  }

  function getModelById(id) {
    return MODELS.find(function (m) { return m.id === id; }) || null;
  }

  function getFreeModels() {
    buildIndexes();
    return (categoryIndex.free || []).slice();
  }

  function getPremiumModels() {
    buildIndexes();
    return (categoryIndex.premium || []).slice();
  }

  function getModelsByCategory(category) {
    buildIndexes();
    return (categoryIndex[category] || []).slice();
  }

  function searchModels(query) {
    if (!query) return getAllModels();
    const q = query.toLowerCase();
    return MODELS.filter(function (m) {
      return m.name.toLowerCase().includes(q) ||
        m.provider.toLowerCase().includes(q) ||
        m.desc.toLowerCase().includes(q) ||
        m.tags.some(function (t) { return t.toLowerCase().includes(q); });
    });
  }

  function getPopularModels(limit) {
    limit = limit || 8;
    // 热门推荐：高质量 + 常用
    const popularIds = [
      'openai/gpt-4o',
      'openai/gpt-4o-mini',
      'anthropic/claude-3.5-sonnet',
      'google/gemini-2.5-pro',
      'deepseek/deepseek-chat',
      'qwen/qwen-max',
      'google/gemini-2.0-flash',
      'meta-llama/llama-4-maverick',
      'anthropic/claude-3-haiku',
      'deepseek/deepseek-r1',
      'openai/o3-mini',
      'qwen/qwq-32b'
    ];
    const result = [];
    popularIds.forEach(function (id) {
      const m = getModelById(id);
      if (m && result.length < limit) result.push(m);
    });
    // 补齐
    MODELS.forEach(function (m) {
      if (result.length >= limit) return;
      if (result.indexOf(m) === -1) result.push(m);
    });
    return result;
  }

  function getProviders() {
    buildIndexes();
    return Object.keys(providerIndex).sort();
  }

  return {
    getAllModels,
    getModelsByProvider,
    getModelById,
    getFreeModels,
    getPremiumModels,
    getModelsByCategory,
    searchModels,
    getPopularModels,
    getProviders
  };
})();

/* === auth.js === */
/**
 * auth.js — 用户认证模块（Supabase Auth + 本地降级）
 * ============================================================
 * 全免费模式：所有用户注册后即可登录，平等享受全部功能。
 */

const AuthManager = (function () {
  'use strict';

  let currentUser = null;
  let currentSession = null;
  let authListeners = [];

  // ============ 本地降级模式 ============

  function localRegister(email, password) {
    const users = Utils.storage('local_users') || {};
    if (users[email]) {
      return { error: '该邮箱已注册' };
    }
    users[email] = {
      email: email,
      password: password,
      createdAt: new Date().toISOString()
    };
    Utils.storage('local_users', users);

    // 自动登录
    const user = { id: 'local_' + Utils.shortId(12), email: email, created_at: new Date().toISOString() };
    Utils.storage('local_current_user', user);
    currentUser = user;
    currentSession = { user: user };
    notifyListeners('SIGNED_IN', currentSession);
    return { data: { user: user }, error: null };
  }

  function localLogin(email, password) {
    const users = Utils.storage('local_users') || {};

    const userData = users[email];
    if (!userData) {
      return { error: '账号不存在，请先注册' };
    }
    if (userData.password !== password) {
      return { error: '密码错误' };
    }
    const user = { id: 'local_' + Utils.shortId(12), email: email, created_at: userData.createdAt };
    Utils.storage('local_current_user', user);
    currentUser = user;
    currentSession = { user: user };
    notifyListeners('SIGNED_IN', currentSession);
    return { data: { user: user }, error: null };
  }

  function localLogout() {
    Utils.storage('local_current_user', null);
    currentUser = null;
    currentSession = null;
    notifyListeners('SIGNED_OUT', null);
  }

  // ============ Supabase 模式 ============

  function getClient() {
    return window.supabaseHelper ? window.supabaseHelper.getClient() : null;
  }

  function isLocal() {
    return window.supabaseHelper ? window.supabaseHelper.isLocal() : true;
  }

  async function init() {
    if (isLocal()) {
      const saved = Utils.storage('local_current_user');
      if (saved) {
        currentUser = saved;
        currentSession = { user: saved };
        notifyListeners('INITIAL_SESSION', currentSession);
      }
      return;
    }

    const client = getClient();
    if (!client) return;

    try {
      const { data, error } = await client.auth.getSession();
      if (error) throw error;
      if (data && data.session) {
        currentSession = data.session;
        currentUser = data.session.user;
        notifyListeners('INITIAL_SESSION', currentSession);
      }
    } catch (e) {
      console.error('[Auth] 初始化失败:', e.message);
    }
  }

  async function login(email, password) {
    if (isLocal()) return localLogin(email, password);

    const client = getClient();
    if (!client) return { error: 'Supabase 未连接' };

    try {
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) return { error: translateError(error.message) };
      currentSession = data.session;
      currentUser = data.user;
      notifyListeners('SIGNED_IN', currentSession);
      return { data: data, error: null };
    } catch (e) {
      return { error: e.message };
    }
  }

  async function register(email, password) {
    if (isLocal()) return localRegister(email, password);

    const client = getClient();
    if (!client) return { error: 'Supabase 未连接' };

    try {
      const { data, error } = await client.auth.signUp({ email, password });
      if (error) return { error: translateError(error.message) };

      if (data.user && data.session) {
        currentSession = data.session;
        currentUser = data.user;
        notifyListeners('SIGNED_IN', currentSession);
      }

      return { data: data, error: null };
    } catch (e) {
      return { error: e.message };
    }
  }

  async function logout() {
    if (isLocal()) {
      localLogout();
      return;
    }

    const client = getClient();
    if (!client) return;

    try {
      await client.auth.signOut();
    } catch (e) {
      console.error('[Auth] 注销失败:', e.message);
    }

    currentUser = null;
    currentSession = null;
    notifyListeners('SIGNED_OUT', null);
  }

  async function resetPassword(email) {
    if (!Utils.isValidEmail(email)) {
      return { error: '请输入有效的邮箱地址' };
    }

    if (isLocal()) {
      return { error: '本地模式下不支持密码重置' };
    }

    const client = getClient();
    if (!client) return { error: 'Supabase 未连接' };

    try {
      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/index.html'
      });
      if (error) return { error: translateError(error.message) };
      return { error: null };
    } catch (e) {
      return { error: e.message };
    }
  }

  function getCurrentUser() {
    return currentUser;
  }

  function isLoggedIn() {
    return !!currentUser;
  }

  function getSession() {
    return currentSession;
  }

  function onAuthStateChange(callback) {
    authListeners.push(callback);
    return function () {
      authListeners = authListeners.filter(function (l) { return l !== callback; });
    };
  }

  function notifyListeners(event, session) {
    authListeners.forEach(function (cb) {
      try { cb(event, session); } catch (e) { /* ignore */ }
    });
  }

  function translateError(msg) {
    if (!msg) return '未知错误';
    const map = {
      'Invalid login credentials': '邮箱或密码错误',
      'Email not confirmed': '邮箱尚未验证，请检查收件箱',
      'User already registered': '该邮箱已注册',
      'Password should be at least 6 characters': '密码至少需要8位字符',
      'Email rate limit exceeded': '请求过于频繁，请稍后再试'
    };
    for (var key in map) {
      if (msg.toLowerCase().indexOf(key.toLowerCase()) !== -1) return map[key];
    }
    return msg;
  }

  // ============ 页面渲染 ============

  let currentTab = 'login';

  function renderLoginPage(container) {
    currentTab = 'login';
    renderAuthForm(container);
  }

  function switchTab(tab, container) {
    currentTab = tab;
    renderAuthForm(container);
  }

  function renderAuthForm(container) {
    const isForgot = currentTab === 'forgot';

    let html = '<div class="auth-page"><div class="auth-card">';
    html += '<div class="auth-logo"><div class="auth-logo-icon">AI</div><h2>AI聚合</h2></div>';

    if (isLocal()) {
      html += '<div class="local-mode-banner">本地模式运行中 · 所有功能免费开放</div>';
    }

    if (!isForgot) {
      html += '<div class="auth-tabs">';
      html += '<button class="auth-tab' + (currentTab === 'login' ? ' active' : '') + '" id="auth-tab-login">登录</button>';
      html += '<button class="auth-tab' + (currentTab === 'register' ? ' active' : '') + '" id="auth-tab-register">注册</button>';
      html += '</div>';
    } else {
      html += '<h3 style="text-align:center;margin-bottom:20px;color:var(--text-secondary);">重置密码</h3>';
    }

    html += '<form id="auth-form" autocomplete="on">';
    html += '<div class="form-group"><label class="form-label">邮箱地址</label>';
    html += '<input type="email" class="form-input" id="auth-email" placeholder="your@email.com" required autocomplete="email" /></div>';

    if (!isForgot) {
      html += '<div class="form-group"><label class="form-label">密码</label>';
      html += '<input type="password" class="form-input" id="auth-password" placeholder="至少8位，含字母+数字" required autocomplete="' + (currentTab === 'login' ? 'current-password' : 'new-password') + '" /></div>';

      if (currentTab === 'register') {
        html += '<div class="form-group"><label class="form-label">确认密码</label>';
        html += '<input type="password" class="form-input" id="auth-password-confirm" placeholder="再次输入密码" required /></div>';
      }
    }

    html += '<div class="form-error" id="auth-error"></div>';

    html += '<button type="submit" class="btn btn-primary btn-block btn-lg" id="auth-submit">';
    if (isForgot) html += '发送重置链接';
    else if (currentTab === 'register') html += '创建账号';
    else html += '登录';
    html += '</button>';
    html += '</form>';

    html += '<div style="text-align:center;margin-top:var(--space-5);font-size:13px;">';
    if (isForgot) {
      html += '<a href="javascript:void(0)" id="auth-back-login">← 返回登录</a>';
    } else if (currentTab === 'login') {
      html += '<a href="javascript:void(0)" id="auth-forgot">忘记密码？</a>';
      html += '<div style="margin-top:8px;color:var(--text-muted);">还没有账号？<a href="javascript:void(0)" id="auth-go-register">立即注册</a></div>';
    } else {
      html += '<div style="color:var(--text-muted);">已有账号？<a href="javascript:void(0)" id="auth-go-login">立即登录</a></div>';
    }
    html += '</div>';

    html += '<div style="margin-top:var(--space-6);"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">';
    html += '<div style="flex:1;height:1px;background:var(--border-color);"></div>';
    html += '<span style="font-size:12px;color:var(--text-muted);">其他登录方式</span>';
    html += '<div style="flex:1;height:1px;background:var(--border-color);"></div></div>';
    html += '<div style="display:flex;gap:10px;">';
    html += '<button class="btn btn-outline" style="flex:1;" disabled title="即将支持">Google</button>';
    html += '<button class="btn btn-outline" style="flex:1;" disabled title="即将支持">GitHub</button>';
    html += '</div></div>';

    html += '</div></div>';

    container.innerHTML = html;
    bindAuthEvents(container);
  }

  function bindAuthEvents(container) {
    const form = container.querySelector('#auth-form');
    const errorEl = container.querySelector('#auth-error');

    const tabLogin = container.querySelector('#auth-tab-login');
    const tabRegister = container.querySelector('#auth-tab-register');
    if (tabLogin) tabLogin.addEventListener('click', function () { switchTab('login', container); });
    if (tabRegister) tabRegister.addEventListener('click', function () { switchTab('register', container); });

    const forgotLink = container.querySelector('#auth-forgot');
    if (forgotLink) forgotLink.addEventListener('click', function () { switchTab('forgot', container); });

    const backLogin = container.querySelector('#auth-back-login');
    if (backLogin) backLogin.addEventListener('click', function () { switchTab('login', container); });

    const goRegister = container.querySelector('#auth-go-register');
    if (goRegister) goRegister.addEventListener('click', function () { switchTab('register', container); });
    const goLogin = container.querySelector('#auth-go-login');
    if (goLogin) goLogin.addEventListener('click', function () { switchTab('login', container); });

    if (form) {
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = container.querySelector('#auth-email').value.trim();
        const password = container.querySelector('#auth-password') ? container.querySelector('#auth-password').value : '';
        const submitBtn = container.querySelector('#auth-submit');

        if (!Utils.isValidEmail(email)) {
          errorEl.textContent = '请输入有效的邮箱地址';
          return;
        }

        const isForgot = currentTab === 'forgot';
        if (!isForgot) {
          if (!password) { errorEl.textContent = '请输入密码'; return; }
          if (!Utils.isValidPassword(password)) {
            errorEl.textContent = '密码至少8位，需包含字母和数字';
            return;
          }
          if (currentTab === 'register') {
            const confirm = container.querySelector('#auth-password-confirm');
            if (confirm && confirm.value !== password) {
              errorEl.textContent = '两次密码不一致';
              return;
            }
          }
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="btn-spinner"></span> 处理中...';
        errorEl.textContent = '';

        const doAction = isForgot ? resetPassword(email) :
          currentTab === 'register' ? register(email, password) :
          login(email, password);

        Promise.resolve(doAction).then(function (result) {
          if (result.error) {
            errorEl.textContent = result.error;
            submitBtn.disabled = false;
            submitBtn.innerHTML = isForgot ? '发送重置链接' : (currentTab === 'register' ? '创建账号' : '登录');
            return;
          }

          if (isForgot) {
            errorEl.style.color = 'var(--success)';
            errorEl.textContent = '重置链接已发送，请检查邮箱';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '发送重置链接';
          }
        }).catch(function (err) {
          errorEl.textContent = err.message || '操作失败';
          submitBtn.disabled = false;
          submitBtn.innerHTML = isForgot ? '发送重置链接' : (currentTab === 'register' ? '创建账号' : '登录');
        });
      });
    }

    const pwInput = container.querySelector('#auth-password');
    if (pwInput) {
      pwInput.addEventListener('input', function () {
        const pw = pwInput.value;
        if (pw && !Utils.isValidPassword(pw)) {
          pwInput.classList.add('error');
        } else if (pw) {
          pwInput.classList.remove('error');
        }
      });
    }
  }

  return {
    init,
    login,
    register,
    logout,
    resetPassword,
    getCurrentUser,
    isLoggedIn,
    getSession,
    onAuthStateChange,
    renderLoginPage
  };
})();

/**
 * api.js — AI API 调用封装（OpenRouter）
 * ============================================================
 * 通过 OpenRouter 统一代理访问所有大模型 API。
 */

const ApiService = (function () {
  'use strict';

  const API_BASE = 'https://openrouter.ai/api/v1';
  const DEFAULT_MODEL = 'openai/gpt-4o-mini';
  const MAX_RETRIES = 3;
  const REQUEST_TIMEOUT = 60000;

  let userApiKey = null;
  let systemApiKey = null;
  let currentController = null;

  // ============ 配置 ============

  function init(apiKey) {
    userApiKey = apiKey || null;
    // 尝试从 localStorage 恢复
    if (!userApiKey) {
      userApiKey = Utils.storage('openrouter_api_key');
    }
  }

  function getKey() {
    return userApiKey || systemApiKey || null;
  }

  function hasKey() {
    return !!getKey();
  }

  function setSystemKey(key) {
    systemApiKey = key;
  }

  function setUserKey(key) {
    userApiKey = key;
    if (key) {
      Utils.storage('openrouter_api_key', key);
    } else {
      Utils.storage('openrouter_api_key', null);
    }
  }

  // ============ 流式聊天 ============

  /**
   * 流式聊天请求
   * @param {Array} messages - [{role:'user'|'assistant'|'system', content:'...'}]
   * @param {String} model - OpenRouter 模型 ID
   * @param {Object} callbacks - { onChunk(text), onDone(fullText, usage), onError(msg), onThinking(content) }
   * @param {Object} options - { temperature, maxTokens, topP }
   */
  function streamChat(messages, model, callbacks, options) {
    model = model || DEFAULT_MODEL;
    options = options || {};

    if (!hasKey()) {
      if (callbacks.onError) callbacks.onError('请先配置 API Key（系统设置中可配置 API Key）');
      return;
    }

    const body = {
      model: model,
      messages: messages.slice(-100), // 最多100条消息
      stream: true,
      temperature: options.temperature !== undefined ? options.temperature : 0.7,
      max_tokens: options.maxTokens || 4096,
      top_p: options.topP !== undefined ? options.topP : 1
    };

    if (options.reasoningEffort) {
      body.reasoning = { effort: options.reasoningEffort };
    }

    // 创建 AbortController
    currentController = new AbortController();

    executeStreamWithRetry(body, callbacks, 0);
  }

  function executeStreamWithRetry(body, callbacks, retryCount) {
    const doRequest = function () {
      const controller = currentController;
      if (!controller || controller.signal.aborted) return;

      const headers = {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getKey(),
        'HTTP-Referer': window.location.origin,
        'X-Title': 'AI聚合'
      };

      fetch(API_BASE + '/chat/completions', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(body),
        signal: controller.signal
      })
        .then(function (response) {
          if (!response.ok) {
            return handleApiError(response, body, callbacks, retryCount);
          }
          processStream(response, callbacks);
        })
        .catch(function (err) {
          if (err.name === 'AbortError') {
            // 取消是正常行为，不报错
            return;
          }

          console.error('[API] 请求失败:', err.message);

          if (retryCount < MAX_RETRIES) {
            const delay = Math.pow(2, retryCount) * 1000;
            console.log('[API] 第 ' + (retryCount + 1) + ' 次重试，等待 ' + delay + 'ms...');
            setTimeout(function () {
              if (currentController && !currentController.signal.aborted) {
                executeStreamWithRetry(body, callbacks, retryCount + 1);
              }
            }, delay);
          } else {
            if (callbacks.onError) {
              callbacks.onError('网络请求失败: ' + err.message);
            }
          }
        });
    };

    doRequest();
  }

  function handleApiError(response, body, callbacks, retryCount) {
    response.json().then(function (data) {
      const errorMsg = data.error ? (data.error.message || JSON.stringify(data.error)) : '未知API错误';

      // 429 速率限制 → 等待并重试
      if (response.status === 429 && retryCount < MAX_RETRIES) {
        const retryAfter = parseInt(response.headers.get('Retry-After') || '5', 10);
        const delay = Math.max(retryAfter * 1000, Math.pow(2, retryCount) * 2000);
        console.log('[API] 速率限制，等待 ' + delay + 'ms 重试...');
        setTimeout(function () {
          if (currentController && !currentController.signal.aborted) {
            executeStreamWithRetry(body, callbacks, retryCount + 1);
          }
        }, delay);
        return;
      }

      // 401/403 → Token 无效
      if (response.status === 401 || response.status === 403) {
        if (callbacks.onError) callbacks.onError('API Key 无效或已过期，请在系统设置中重新配置');
        return;
      }

      // 402 → 余额不足
      if (response.status === 402) {
        if (callbacks.onError) callbacks.onError('OpenRouter 账户余额不足，请检查API Key余额');
        return;
      }

      // 其他错误
      if (retryCount < MAX_RETRIES && (response.status >= 500 || response.status === 0)) {
        const delay = Math.pow(2, retryCount) * 1000;
        setTimeout(function () {
          if (currentController && !currentController.signal.aborted) {
            executeStreamWithRetry(body, callbacks, retryCount + 1);
          }
        }, delay);
      } else {
        if (callbacks.onError) callbacks.onError('API 错误: ' + errorMsg);
      }
    }).catch(function () {
      if (callbacks.onError) callbacks.onError('API 错误 (HTTP ' + response.status + ')');
    });
  }

  function processStream(response, callbacks) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let fullText = '';
    let buffer = '';

    function read() {
      if (!currentController || currentController.signal.aborted) {
        reader.cancel();
        return;
      }

      reader.read().then(function (result) {
        if (result.done) {
          // 流结束
          if (callbacks.onDone) callbacks.onDone(fullText);
          return;
        }

        buffer += decoder.decode(result.value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line || !line.startsWith('data: ')) continue;

          const data = line.slice(6);
          if (data === '[DONE]') {
            if (callbacks.onDone) callbacks.onDone(fullText);
            return;
          }

          try {
            const parsed = JSON.parse(data);
            const choice = parsed.choices && parsed.choices[0];

            if (choice) {
              // 处理普通内容
              const delta = choice.delta;
              if (delta && delta.content) {
                fullText += delta.content;
                if (callbacks.onChunk) callbacks.onChunk(delta.content);
              }

              // 处理推理内容（DeepSeek R1、o3-mini等）
              if (delta && delta.reasoning_content) {
                if (callbacks.onThinking) callbacks.onThinking(delta.reasoning_content);
              }
            }
          } catch (e) {
            // 忽略解析错误，继续处理
          }
        }

        read();
      }).catch(function (err) {
        if (err.name !== 'AbortError') {
          console.error('[API] 读取流失败:', err.message);
          if (callbacks.onError) callbacks.onError('读取流失败: ' + err.message);
        }
      });
    }

    read();
  }

  function cancelStream() {
    if (currentController) {
      currentController.abort();
      currentController = null;
    }
  }

  function isStreaming() {
    return currentController !== null && !currentController.signal.aborted;
  }

  // ============ 模型测试 ============

  function testModel(modelId) {
    if (!hasKey()) {
      return Promise.reject(new Error('未配置 API Key'));
    }

    return fetch(API_BASE + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getKey(),
        'HTTP-Referer': window.location.origin
      },
      body: JSON.stringify({
        model: modelId,
        messages: [{ role: 'user', content: 'Hi' }],
        max_tokens: 5
      }),
      signal: AbortSignal.timeout(15000)
    }).then(function (res) {
      if (!res.ok) {
        return res.json().then(function (data) {
          throw new Error(data.error ? data.error.message : '模型不可用 (HTTP ' + res.status + ')');
        });
      }
      return res.json();
    }).then(function (data) {
      return { ok: true, model: data.model, usage: data.usage };
    });
  }

  // ============ 使用情况 ============

  function getUsage() {
    if (!hasKey()) {
      return Promise.reject(new Error('未配置 API Key'));
    }

    // 尝试获取当前 Key 的额度信息
    return fetch(API_BASE + '/auth/key', {
      headers: {
        'Authorization': 'Bearer ' + getKey()
      },
      signal: AbortSignal.timeout(10000)
    }).then(function (res) {
      if (!res.ok) throw new Error('无法获取使用情况');
      return res.json();
    }).then(function (data) {
      return {
        label: data.label || 'Unknown',
        limit: data.limit || 0,
        usage: data.usage || 0,
        limitRemaining: data.limit_remaining || 0,
        isFreeTier: data.is_free_tier || false
      };
    });
  }

  // 初始化
  init();

  return {
    init,
    getKey,
    hasKey,
    setSystemKey,
    setUserKey,
    streamChat,
    cancelStream,
    isStreaming,
    testModel,
    getUsage
  };
})();

      const saved = Utils.storage('current_model');

    }
  }

      conversations = saved;
    } else {
      conversations = [];
    }
  }

  function saveConversations() {
    Utils.storage('conversations', conversations);
  }

  function loadMessages(chatId) {
    const key = 'messages_' + chatId;
    const saved = Utils.storage(key);
    if (saved && Array.isArray(saved)) {
      return saved;
    }
    return [];
  }

  function saveMessages(chatId, messages) {
    const key = 'messages_' + chatId;
    Utils.storage(key, messages);
  }

  function getModel() {
    return ModelRegistry.getModelById(currentModel) || ModelRegistry.getModelById('openai/gpt-4o-mini');
  }

  function selectModel(modelId) {
    currentModel = modelId;
    Utils.storage('current_model', modelId);
    // 更新当前对话的模型
    if (currentChatId) {
      const conv = conversations.find(function (c) { return c.id === currentChatId; });
      if (conv) {
        conv.model_id = modelId;
        saveConversations();
      }
    }

  }

      model_id: currentModel,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    conversations.unshift(conv);
    saveConversations();
    saveMessages(currentChatId, []);
    renderSidebar();
    renderMessages();
    updateModelDisplay();
    focusInput();
    return currentChatId;
  }

  function switchChat(chatId) {
    currentChatId = chatId;
    currentMessages = loadMessages(chatId);
    const conv = conversations.find(function (c) { return c.id === chatId; });
    if (conv) {
      currentModel = conv.model_id || currentModel;
    }
    ApiService.cancelStream();
    isProcessing = false;
    renderMessages();
    renderSidebar();
    updateModelDisplay();
  }

  function deleteChat(chatId) {
    conversations = conversations.filter(function (c) { return c.id !== chatId; });
    saveConversations();
    Utils.storage('messages_' + chatId, null);
    if (currentChatId === chatId) {
      if (conversations.length > 0) {
        switchChat(conversations[0].id);

      }

    if (!currentChatId) return;

  // ============ 发送消息 ============

  function sendMessage(content) {
    if (!content || !content.trim() || isProcessing) return;
    content = content.trim();

    // 如果没有当前对话，创建新的
    if (!currentChatId) {
      createNewChat();
    }

    // 权限检查

    };

    };

    if (!ApiService.hasKey()) {

      return;

    // 调用 API
    ApiService.streamChat(contextMessages, currentModelId, {
      onChunk: function (text) {

        if (msg) {
          msg.content += text;

      },
      onDone: function (fullText) {
        const msg = currentMessages.find(function (m) { return m.id === aiMsgId; });

          msg.content = fullText;
          msg.streaming = false;
          updateMessageContent(aiMsgId, fullText, false);
        }
        finishMessage(aiMsgId, fullText);
      },
      onError: function (msg) {
        const m = currentMessages.find(function (x) { return x.id === aiMsgId; });
        if (m) {
          m.content = '错误: ' + msg;
          m.streaming = false;

      .filter(function (m) { return m.role !== 'system' && !m.streaming; })
      .map(function (m) { return { role: m.role, content: m.content }; });

    const model = getModel();
    const maxTokens = model ? model.contextWindow : 128000;
    // 粗略裁剪历史消息以避免超出上下文
    let totalTokens = Utils.estimateTokens(systemMsg.content) + 200; // 预留
    const result = [];
    for (let i = history.length - 1; i >= 0; i--) {

      html += '</div>';

    // 最后一条正在流式输出时显示打字指示器
    if (isProcessing && currentMessages.length > 0) {
      const last = currentMessages[currentMessages.length - 1];
      if (last.role === 'assistant' && !last.content && last.streaming) {
        html += '<div class="message-row assistant">';

  function updateMessageContent(msgId, content, streaming) {
    const bubble = document.getElementById('bubble-' + msgId);

    bubble.innerHTML = renderMarkdown(content);

      bubble.innerHTML += '<span class="stream-cursor" id="cursor-' + msgId + '"></span>';
    }

    bubble.querySelectorAll('.code-copy-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {

          setTimeout(function () {
            btn.textContent = '复制';
            btn.classList.remove('copied');
          }, 2000);
        });
      });
    });
  }

  function renderMarkdown(text) {
    if (!text) return '';
    let html = text;

    // 转义HTML
    html = Utils.escapeHtml(html);

    // 代码块 (```)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function (match, lang, code) {
      return '<div class="code-block-wrapper">' +
        '<div class="code-block-header"><span class="code-lang">' + (lang || 'code') + '</span>' +
        '<button class="code-copy-btn" data-code="' + Utils.escapeHtml(code).replace(/"/g, '&quot;') + '">复制</button></div>' +
        '<pre><code>' + code + '</code></pre></div>';
    });

    // 行内代码
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // 粗体
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // 斜体
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

    // ### 标题
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // 引用
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // 无序列表
    html = html.replace(/^[\-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, function (match) {
      return '<ul>' + match + '</ul>';
    });

    // 有序列表
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

    // 水平线
    html = html.replace(/^---$/gm, '<hr>');

    // 链接
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // 换行
    html = html.replace(/\n\n/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');

    // 包裹段落
    html = '<p>' + html + '</p>';

    return html;
  }

  // ============ 事件绑定 ============

  function bindChatEvents() {
    // 模型选择器开关
    if (domCache['chat-model-selector'] && domCache['model-dropdown']) {
      domCache['chat-model-selector'].addEventListener('click', function (e) {
        e.stopPropagation();
        domCache['model-dropdown'].classList.toggle('open');
      });

      document.addEventListener('click', function () {
        domCache['model-dropdown'].classList.remove('open');
      });

      domCache['model-dropdown'].addEventListener('click', function (e) {
        e.stopPropagation();
      });
    }

    // 侧边栏切换
    if (domCache['sidebar-toggle'] && domCache['app-layout']) {
      domCache['sidebar-toggle'].addEventListener('click', function () {
        const layout = domCache['app-layout'];
        const isCollapsed = layout.classList.contains('sidebar-collapsed');
        if (isCollapsed) {
          layout.classList.remove('sidebar-collapsed');
          domCache['sidebar-toggle'].classList.remove('collapsed');
          domCache['sidebar-toggle'].innerHTML = '◀';
        } else {
          layout.classList.add('sidebar-collapsed');
          domCache['sidebar-toggle'].classList.add('collapsed');
          domCache['sidebar-toggle'].innerHTML = '▶';
        }
      });
    }

    // 新对话
    if (domCache['sidebar-new-chat']) {
      domCache['sidebar-new-chat'].addEventListener('click', function () {
        createNewChat();
      });
    }

    // 发送按钮
    if (domCache['send-btn']) {
      domCache['send-btn'].addEventListener('click', function () {
        const content = domCache['chat-input'] ? domCache['chat-input'].value : '';
        sendMessage(content);
      });
    }

    // 输入框
    if (domCache['chat-input']) {
      domCache['chat-input'].addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const content = domCache['chat-input'].value;
          sendMessage(content);
        }
      });

      domCache['chat-input'].addEventListener('input', function () {
        updateCharCount();
        autoResizeTextarea();
      });
    }

    // 清空对话
    if (domCache['btn-clear-chat']) {
      domCache['btn-clear-chat'].addEventListener('click', function () {
        Utils.showModal({
          title: '清空对话',

          confirmText: '清空',
          danger: true,
          onConfirm: function () { clearCurrentChat(); }
        });
      });
    }

    // 设置按钮
    if (domCache['btn-member']) {
      domCache['btn-member'].addEventListener('click', function () {
        if (typeof App !== 'undefined' && App.navigate) {
          App.navigate('/member');
        }
      });
    }

    // 管理按钮
    if (domCache['btn-admin']) {
      domCache['btn-admin'].addEventListener('click', function () {
        if (typeof App !== 'undefined' && App.navigate) {
          App.navigate('/admin');
        }
      });
    }
  }

  function updateCharCount() {
    if (!domCache['chat-input'] || !domCache['char-count']) return;
    const len = domCache['chat-input'].value.length;
    domCache['char-count'].textContent = len + '/8000';
    if (len > 8000) {
      domCache['char-count'].style.color = 'var(--danger)';
    } else {
      domCache['char-count'].style.color = 'var(--text-muted)';
    }
  }

  function autoResizeTextarea() {
    const ta = domCache['chat-input'];
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
  }

  function updateSendButton() {
    if (!domCache['send-btn']) return;
    if (isProcessing) {
      domCache['send-btn'].disabled = true;
      domCache['send-btn'].innerHTML = '<span class="btn-spinner"></span>';

    }
  }

  function clearInput() {
    if (domCache['chat-input']) {
      domCache['chat-input'].value = '';
      domCache['chat-input'].style.height = 'auto';
      updateCharCount();
    }
  }

  function focusInput() {
    if (domCache['chat-input']) {
      domCache['chat-input'].focus();
    }
  }

  function scrollToBottom() {
    if (domCache['chat-messages']) {
      setTimeout(function () {
        const el = domCache['chat-messages'];
        if (el) el.scrollTop = el.scrollHeight;
      }, 50);
    }
  }

  // ============ 公开 API ============
  return {
    init,
    renderChatPage,
    createNewChat,
    switchChat,
    deleteChat,
    sendMessage,
    selectModel,
    clearCurrentChat,
    get currentChatId() { return currentChatId; },
    get currentModel() { return currentModel; },
    get conversations() { return conversations; }
  };
})();

      html += '<td>' + Utils.escapeHtml(u.email || '未知') + '</td>';
      html += '<td><span class="level-badge ' + u.level + '">' + (levelNames[u.level] || u.level) + '</span></td>';
      html += '<td>' + Utils.formatDate(u.created_at) + '</td>';
      html += '<td><span class="status-badge ' + u.status + '">' + (u.status === 'active' ? '正常' : '禁用') + '</span></td>';
      html += '<td>';
      html += '<button class="btn btn-outline btn-xs" disabled title="本地模式不支持">编辑</button>';
      html += '</td>';
      html += '</tr>';
    });

    tbody.innerHTML = html;
  }

  function (c) {
      html += '<tr>';
      html += '<td><code style="font-family:monospace;font-size:14px;">' + Utils.escapeHtml(c.code) + '</code></td>';
      html += '<td>' + (levelNames[c.level] || c.level) + '</td>';
      html += '<td>' + (c.is_used ? '<span style="color:var(--text-muted);">已使用</span>' : '<span style="color:var(--success);">未使用</span>') + '</td>';
      html += '<td>' + (c.used_by ? Utils.escapeHtml(c.used_by) : '-') + '</td>';
      html += '<td>' + Utils.formatDate(c.created_at) + '</td>';
      html += '</tr>';
    });

    tbody.innerHTML = html;
  }

  function bindAdminEvents(container) {
    // Tab 切换
    container.querySelectorAll('.admin-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        currentTab = tab.getAttribute('data-tab');
        renderAdminPage(container);
      });
    });

    // 保存设置
    const saveSettingsBtn = container.querySelector('#btn-save-settings');
    if (saveSettingsBtn) {
      saveSettingsBtn.addEventListener('click', function() {
        const config = Utils.storage('app_config') || {};
        config.siteName = (container.querySelector('#set-site-name') || {}).value || 'AI聚合';
        config.theme = (container.querySelector('#set-theme') || {}).value || 'dark';
        config.defaultModel = (container.querySelector('#set-default-model') || {}).value || 'openai/gpt-4o-mini';
        config.dailyFreeLimit = parseInt((container.querySelector('#set-daily-free-limit') || {}).value, 10) || 20;
        Utils.storage('app_config', config);
        
        // 应用主题
        document.documentElement.setAttribute('data-theme', config.theme);
        document.body.className = config.theme === 'light' ? 'light-theme' : '';
        
        // 应用默认模型
        if (config.defaultModel) {
          Utils.storage('current_model', config.defaultModel);
        }
        
        // 更新网站标题
        document.title = config.siteName + ' · 智能大模型中转站';
        
        Utils.showToast('设置已保存', 'success');
      });
    }

    // 保存 API Key
    const saveApiBtn = container.querySelector('#btn-save-api-key');
    if (saveApiBtn) {
      saveApiBtn.addEventListener('click', function() {
        const keyInput = container.querySelector('#set-api-key');
        if (keyInput) {
          const key = keyInput.value.trim();
          if (key) {
            ApiService.setUserKey(key);
            Utils.showToast('API Key 已保存', 'success');
          } else {
            Utils.showToast('请输入有效的 API Key', 'warning');
          }
        }
      });
    }

    // 清除 API Key
    const clearApiBtn = container.querySelector('#btn-clear-api-key');
    if (clearApiBtn) {
      clearApiBtn.addEventListener('click', function() {
        ApiService.setUserKey(null);
        const keyInput = container.querySelector('#set-api-key');
        if (keyInput) keyInput.value = '';
        Utils.showToast('API Key 已清除', 'info');
      });
    }

    // 用户搜索
    const userSearch = container.querySelector('#user-search');
    if (userSearch) {
      userSearch.addEventListener('input', function () {
        const q = userSearch.value.toLowerCase();
        const rows = container.querySelectorAll('#users-table-body tr');
        rows.forEach(function (row) {
          const text = row.textContent.toLowerCase();
          row.style.display = q && !text.includes(q) ? 'none' : '';
        });
      });
    }

    // 返回
    const backBtn = container.querySelector('#admin-back-chat');
    if (backBtn) {
      backBtn.addEventListener('click', function () {
        if (typeof App !== 'undefined' && App.navigate) {
          App.navigate('/chat');
        }
      });
    }
  }

  return {
    init,
    isAdmin,
    renderAdminPage,
    generateCodes
  };
})();

/* === app.js === */
/**
 * app.js — 应用主控制器，SPA 路由管理
 * ============================================================
 */

const App = (function () {
  'use strict';

  // 全局状态
  const AppState = {
    currentUser: null,
    currentPage: 'loading',
    memberInfo: null,
    isOnline: navigator.onLine,
    config: { theme: 'dark' }
  };

  // 路由表
  const routes = {
    '/login': renderLoginPage,
    '/chat': renderChatPageWrapper,
    '/member': renderMemberPageWrapper,
    '/admin': renderAdminPageWrapper,
    '/': defaultRoute
  };

  // ============ 初始化 ============

  async function init() {
    try {
      // 注册全局错误处理
      setupErrorHandling();

      // 初始化 Supabase
      if (window.supabaseHelper) {
        supabaseHelper = window.supabaseHelper;
      }

      // 初始化 Auth
      AuthManager.onAuthStateChange(function (event, session) {
        if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
          AppState.currentUser = session ? session.user : null;
          AppState.currentPage = 'chat';
          // 加载会员信息
          MemberManager.init();
          // 如果不是登录中，导航到聊天
          if (event === 'SIGNED_IN') {
            navigate('/chat');
          }
        } else if (event === 'SIGNED_OUT') {
          AppState.currentUser = null;
          AppState.memberInfo = null;
          navigate('/login');
        }
      });

      await AuthManager.init();

      // 初始化会员
      await MemberManager.init();

      // 初始化聊天
      ChatManager.init();

      // 初始化管理后台
      AdminManager.init();

      // 导航到默认页面
      const hash = parseHash();
      navigate(hash || '/');

      // 隐藏预加载动画
      hideGlobalLoading();

    } catch (e) {
      console.error('[App] 初始化失败:', e);
      Utils.showToast('应用初始化失败，请刷新页面', 'error');
      hideGlobalLoading();
    }
  }

  function parseHash() {
    const hash = window.location.hash;
    if (hash && hash.length > 1) {
      return hash.substring(1);
    }
    return null;
  }

  function defaultRoute() {
    if (AuthManager.isLoggedIn()) {
      return '/chat';
    }
    return '/login';
  }

  // ============ 导航 ============

  function navigate(path) {
    // 解析路由
    let route = path;
    if (!routes[route]) {
      // 处理默认路由
      route = '/';
    }

    const handler = routes[route];
    if (!handler) {
      route = '/';
    }

    // 如果路由是默认，先解析
    if (route === '/') {
      route = defaultRoute();
    }

    // 更新 hash
    if (window.location.hash !== '#' + path) {
      window.history.pushState(null, '', '#' + path);
    }

    // 更新状态
    AppState.currentPage = route;

    // 渲染页面
    renderPage(route);
  }

  function renderPage(pageName) {
    const container = document.getElementById('app-root');
    if (!container) return;

    // 页面切换动画
    container.style.opacity = '0';
    container.style.transform = 'translateY(10px)';

    setTimeout(function () {
      const handler = routes[pageName];
      if (handler) {
        handler();
      }
      container.style.opacity = '1';
      container.style.transform = 'translateY(0)';
    }, 150);
  }

  // ============ 页面渲染 ============

  function renderLoginPage() {
    const container = document.getElementById('app-root');
    if (!container) return;
    if (AuthManager.isLoggedIn()) {
      navigate('/chat');
      return;
    }
    AuthManager.renderLoginPage(container);
  }

  function renderChatPageWrapper() {
    const container = document.getElementById('app-root');
    if (!container) return;
    if (!AuthManager.isLoggedIn()) {
      navigate('/login');
      return;
    }
    ChatManager.renderChatPage(container);
  }

  function renderMemberPageWrapper() {
    const container = document.getElementById('app-root');
    if (!container) return;
    if (!AuthManager.isLoggedIn()) {
      navigate('/login');
      return;
    }
    MemberManager.renderMemberPage(container);
  }

  function renderAdminPageWrapper() {
    const container = document.getElementById('app-root');
    if (!container) return;
    if (!AuthManager.isLoggedIn()) {
      navigate('/login');
      return;
    }
    AdminManager.renderAdminPage(container);
  }

  // ============ 加载状态 ============

  function showGlobalLoading() {
    const preloader = document.querySelector('.preloader');
    if (preloader) preloader.style.display = 'flex';
  }

  function hideGlobalLoading() {
    const preloader = document.querySelector('.preloader');
    if (preloader) {
      preloader.style.opacity = '0';
      setTimeout(function () {
        preloader.style.display = 'none';
      }, 600);
    }
  }

  // ============ 错误处理 ============

  function setupErrorHandling() {
    // 全局 JS 错误
    window.onerror = function (message, source, lineno, colno, error) {
      console.error('[Global Error]', message, 'at', source, lineno + ':' + colno);
      Utils.errorHandler(error || new Error(message), 'Global');
      return true;
    };

    // Promise 未处理拒绝
    window.addEventListener('unhandledrejection', function (event) {
      console.error('[Unhandled Rejection]', event.reason);
      Utils.errorHandler(event.reason, 'Promise');
    });

    // 网络状态变化
    window.addEventListener('online', function () {
      AppState.isOnline = true;
      Utils.showToast('网络已恢复', 'info');
    });

    window.addEventListener('offline', function () {
      AppState.isOnline = false;
      Utils.showToast('网络已断开', 'warning');
    });

    // 路由变化监听
    window.addEventListener('hashchange', function () {
      const hash = parseHash();
      if (hash && hash !== AppState.currentPage) {
        navigate(hash);
      }
    });

    // 浏览器的前进后退
    window.addEventListener('popstate', function () {
      const hash = parseHash();
      if (hash && hash !== AppState.currentPage) {
        navigate(hash);
      }
    });
  }

  // ============ 公开 API ============
  return {
    init,
    navigate,
    renderPage,
    showGlobalLoading,
    hideGlobalLoading,
    get state() { return AppState; }
  };
})();

// ============ 启动 ============
document.addEventListener('DOMContentLoaded', function () {
  // 等待 Supabase CDN 加载完成
  const checkSupabaseAndStart = function () {
    if (window.supabaseHelper) {
      App.init();
    } else if (window.supabase) {
      // 手动初始化
      try {
        window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        App.init();
      } catch (e) {
        console.warn('Supabase 初始化失败，进入本地模式');
        App.init();
      }
    } else {
      // CDN 未加载，直接本地模式
      console.warn('Supabase CDN 未加载，使用本地模式');
      App.init();
    }
  };

  // 给 CDN 一点加载时间
  setTimeout(checkSupabaseAndStart, 500);
});


</script>
